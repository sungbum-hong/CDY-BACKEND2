server:
  port: 8080
spring:
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  datasource:
    url: jdbc:mysql://${MYSQL_PRIVATE_HOST}:${MYSQL_PRIVATE_PORT}/${MYSQL_DATABASE}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    web:
      pageable:
        max-page-size: 20000
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
      show_sql: true
    sql:
      init:
        mode: never
jwt:
  secret: ${JWT_SECRET}
  accessTokenExpiresIn: 3600000
  refreshTokenExpiresIn: 604800000
storage:
  provider: r2
  bucket: localhub
  accessKey: ${R2_ACCESS_KEY}
  secretKey: ${R2_SECRET_KEY}
  endpoint: ${R2_ENDPOINT}
  region: auto
  presignSecond: 300
